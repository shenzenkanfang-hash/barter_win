[workspace]
members = ["crates/*"]
resolver = "3"

[workspace.dependencies]
parking_lot = "0.12"
rust_decimal = "1.36"
rust_decimal_macros = "1.36"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = "0.3"
chrono = "0.4"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
fnv = "1.0"
